name: qr_code_generator
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0
  saver_gallery: ^3.0.6
  share_plus: ^10.0.0
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.1.1
  image_picker: ^1.1.2
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/Icons/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true